<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pertemuan ke 2</title>
    <style>
table {
  width: 400px;
    border-collapse: collapse;
    text-align: center;
    margin-bottom: 60px;
}
table, th, td {
    border: 1px solid black;
}
th {
    background-color: rgb(116, 153, 255);
    color: white;
    padding: 2pt;
    height: 20pt;
    
}
p {
    margin-bottom: 10pt;
}

label{
    display: inline-block;
    width: 80px; 
    margin-right: 10px;
}

.checkbox-label{
    width: auto;
}

    </style>
</head>
<body>
<table>
  <thead>
    <tr>
      <th rowspan="2" >Nama</th>
      <th colspan="3" >Nilai</th>
    </tr>
    <tr>
        <th>kimia </th>
        <th>fisika</th>
        <th>biologi</th>
    </tr>
  </thead>
  
  <tbody>
    <tr>
      <td>robby</td>
      <td>76</td>
      <td>80</td>
      <td>81</td>
    </tr>
    <tr>
      <td>rendi</td>
      <td>84</td>
      <td>70</td>
      <td>75</td>
    </tr>
    <tr>
        <td>Alfian</td>
        <td>96</td>
        <td>70</td>
        <td>71</td>
    </tr>
  </tbody>
</table>

<form >
    <fieldset style="width: 300px; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <legend style="padding: 0 5px;">Login</legend>
        <p>
            <label for="username">Username:</label>
            <input type="text">

        </p>
        <p>
            <label for="password">Password:</label>
            <input type="password">

        </p>
        <p>
            <input type="checkbox">
            <label for="remember" class="checkbox-label">Remember me</label>
        </p>
    </fieldset>


</form>

</body>
</html>
